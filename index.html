<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤・退勤 System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:40px;
}

/* DROPDOWN */
.dropdown-header{
    position: fixed;
    top: 20px;
    right: 20px;
    width:50px;
    height:50px;
    background:#1f2937;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    cursor:pointer;
    z-index:1000;
    flex-direction:column;
}

.menu{
    position:absolute;
    top:60px;
    right:0;
    width:160px;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
    display:none;
}

.menu div{
    padding:12px;
    border-bottom:1px solid #334155;
    cursor:pointer;
}

.menu div:hover{
    background:#334155;
}

.menu a{
    color:white;
    text-decoration:none;
}

.dropdown-header i{
    font-size:22px;
    color:white;
}
.menu a{
    text-decoration:none;
    color:white;
    display:block;
}

/* INFO BOX (LOCKED INPUTS) */
.info-box{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.info-box input{
    flex:1;
    min-width:200px;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    outline:none;
    background:#111827;
    color:white;
}

/* BUTTONS */
.btn-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-bottom:30px;
}

button{
    padding:14px 35px;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.start-btn{
    background:#22c55e;
    color:white;
}

.end-btn{
    background:#ef4444;
    color:white;
}

/* TABLE */
.table-box{
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:0.6s;
}

.table-box.show{
    max-height:800px;
    opacity:1;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    color:black;
}

th{
    background:#1e293b;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

/* SUMMARY */
.summary{
    width:40%;
    margin:40px auto 0;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    text-align:center;
}

/* STATUS */
#statusMsg{
    margin-left:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- DROPDOWN -->
<div class="dropdown-header" onclick="toggleMenu()">
    <i class="fa-solid fa-list"></i>

    <div id="menu" class="menu">
    
    <a href="https://at397988-dev.github.io/created-/">
        <div>Create ID</div>
    </a>

    <a href="https://at397988-dev.github.io/loginrew/">
        <div>Login</div>
    </a>

    <a href="https://at397988-dev.github.io/ANILNEPAL/">
        <div>Forgot ID</div>
    </a>
    
    <div onclick="toggleTable()">Time Table</div>

</div>
</div>

<div class="container">

<h1>出勤・退勤 System</h1>

<!-- LOCKED INPUTS -->
<div class="info-box">
    <input type="text" id="company" placeholder="Company Name" readonly>
    <input type="text" id="code" placeholder="Company Code" readonly>
    <input type="text" id="employee" placeholder="Your Name" readonly>
</div>

<div class="btn-box">
    <button class="start-btn" onclick="startWork()">出勤</button>
    <button class="end-btn" onclick="endWork()">退勤</button>
    <span id="statusMsg"></span>
</div>

<!-- TABLE -->
<div id="tableBox" class="table-box">
<table>
<thead>
<tr>
    <th>Date</th>
    <th>Company</th>
    <th>Code</th>
    <th>Name</th>
    <th>Start</th>
    <th>End</th>
    <th>Status</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- SUMMARY -->
<div class="summary">
<h2>Monthly Summary</h2>
<p>Total Work Time: <strong id="totalWork">0</strong> hrs</p>
</div>

</div>

<script>

/* MENU */
function toggleMenu(){
    let menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* TABLE */
function toggleTable(){
    document.getElementById("tableBox").classList.toggle("show");
}

/* LOGIN DATA LOAD */
window.onload = function(){

    const user = JSON.parse(localStorage.getItem("user"));

    if(!user){
        alert("Login first");
        window.location.href = "login.html";
        return;
    }

    document.getElementById("employee").value = user.NAME;
    document.getElementById("company").value = user.COMPANY || "N/A";
    document.getElementById("code").value = user.CODE || "N/A";
}

/* WORK SYSTEM */
let activeRow = null;
let total = 0;

function startWork(){

    if(activeRow){
        alert("Already checked in!");
        return;
    }

    let now = new Date();
    let table = document.getElementById("tableBody");

    let row = table.insertRow();
    row.dataset.start = now.getTime();

    row.innerHTML = `
        <td>${now.toLocaleDateString()}</td>
        <td>${document.getElementById("company").value}</td>
        <td>${document.getElementById("code").value}</td>
        <td>${document.getElementById("employee").value}</td>
        <td>${now.toLocaleTimeString()}</td>
        <td>-</td>
        <td>Working</td>
    `;

    activeRow = row;
}

function endWork(){

    if(!activeRow){
        alert("No active check-in");
        return;
    }

    let end = new Date();
    let start = new Date(parseInt(activeRow.dataset.start));

    let hrs = (end - start) / (1000 * 60 * 60);

    activeRow.cells[5].innerText = end.toLocaleTimeString();
    activeRow.cells[6].innerText = "Completed " + hrs.toFixed(2) + " hrs";

    total += hrs;
    document.getElementById("totalWork").innerText = total.toFixed(2);

    activeRow = null;
}

</script>

</body>
</html>
